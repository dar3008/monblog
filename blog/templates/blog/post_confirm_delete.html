{% extends 'blog/base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-body text-center p-4">
        <h4 class="text-danger mb-3">Confirmer la suppression</h4>
        <p>Voulez-vous vraiment supprimer l'article <strong>« {{ post.title }} »</strong> ?</p>
        <p class="text-muted" style="font-size:13px;">Cette action est irréversible.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-center gap-3 mt-3">
            <button type="submit" class="btn btn-danger">Oui, supprimer</button>
            <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
