{% extends 'blog/base.html' %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="mb-4">{{ action }} un article</h3>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-500">Titre</label>
            <input type="text" name="title" class="form-control"
              value="{% if post %}{{ post.title }}{% endif %}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-500">Contenu</label>
            <textarea name="content" class="form-control" rows="8" required>{% if post %}{{ post.content }}{% endif %}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ action }}</button>
            <a href="{% url 'post_list' %}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
